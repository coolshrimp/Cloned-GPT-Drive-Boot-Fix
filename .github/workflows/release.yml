name: Build & Release

# Builds the app on every push/PR to catch compile errors,
# and publishes a zipped Release build whenever a version tag (v*) is pushed.
#
# To ship a release:
#   git tag v1.1.0
#   git push origin v1.1.0

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild "Cloned GPT Drive - Boot Fix.sln" /p:Configuration=Release /p:Platform="Any CPU" /v:minimal

      - name: Zip build output
        shell: pwsh
        run: |
          $out = "Cloned GPT Drive - Boot Fix/bin/Release"
          Compress-Archive -Path "$out/*.exe", "$out/*.exe.config" -DestinationPath "ClonedGPTDrive-BootFix.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClonedGPTDrive-BootFix
          path: ClonedGPTDrive-BootFix.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClonedGPTDrive-BootFix.zip
          generate_release_notes: true
