name: Build & Release

# Builds the app on every push/PR to catch compile errors,
# and publishes a zipped Release build whenever a version tag (v*) is pushed.
#
# To ship a release:
#   git tag v1.1.0
#   git push origin v1.1.0

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild "Cloned GPT Drive - Boot Fix.sln" /p:Configuration=Release /p:Platform="Any CPU" /v:minimal

      # Single-file release: the app has no DLL dependencies and runs fine without
      # the .exe.config (settings defaults are compiled in; Win10/11 ship .NET 4.8)
      - name: Stage single-file release asset
        shell: pwsh
        run: Copy-Item "Cloned GPT Drive - Boot Fix/bin/Release/Cloned GPT Drive - UEFI Boot Fix.exe" "ClonedGPTDrive-BootFix.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClonedGPTDrive-BootFix
          path: ClonedGPTDrive-BootFix.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClonedGPTDrive-BootFix.exe
          generate_release_notes: true
